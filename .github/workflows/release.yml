name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install -U pip
          python -m pip install -e .[dev]
      - name: Run tests
        run: pytest
      - name: Build package
        run: python -m build
      - name: Package smoke test
        run: |
          chmod +x scripts/package_smoke.sh
          ./scripts/package_smoke.sh
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Post-publish PyPI install smoke test
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          python -m venv /tmp/uscis-pdf-ops-pypi
          source /tmp/uscis-pdf-ops-pypi/bin/activate
          python -m pip install -U pip
          python -m pip install "uscis-pdf-ops-mcp==${VERSION}"
          uscis-pdf-ops-mcp --help >/dev/null
      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Publish to official MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
